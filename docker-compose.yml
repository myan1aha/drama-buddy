version: '3.8'

services:
  # ============================================================
  # Drama Buddy Server (Next.js API + SSE Cast)
  # ============================================================
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/drama-buddy.db
      # AI Provider — choose one
      - AI_PROVIDER=${AI_PROVIDER:-deepseek}
      - AI_API_KEY=${AI_API_KEY}
      - AI_MODEL=${AI_MODEL:-}
      - AI_BASE_URL=${AI_BASE_URL:-}
      # ASR (optional)
      - ASR_PROVIDER=${ASR_PROVIDER:-none}
      - ASR_API_KEY=${ASR_API_KEY:-}
    volumes:
      - drama-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ============================================================
  # TV PWA Static Server (optional — can use any CDN)
  # ============================================================
  tv:
    image: nginx:alpine
    ports:
      - "5173:80"
    volumes:
      - ./apps/tv/dist:/usr/share/nginx/html:ro
      - ./nginx-tv.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  drama-data:
    driver: local
