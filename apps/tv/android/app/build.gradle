plugins {
    id 'com.android.application'
}

android {
    namespace 'com.dramabuddy'
    compileSdk 34

    defaultConfig {
        applicationId "com.dramabuddy.tv"
        minSdk 21          // Android TV 最低支持
        targetSdk 34
        versionCode 1
        versionName "0.1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
        }
    }

    // 将 Vite 构建产物复制到 assets
    sourceSets {
        main {
            assets.srcDirs = ['src/main/assets']
        }
    }
}

dependencies {
    implementation 'androidx.leanback:leanback:1.0.0'
}
